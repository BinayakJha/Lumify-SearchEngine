<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 520" width="840" height="520" role="img" aria-label="Lumify demo: ask a question and see the reasons you might be asking it">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#d946ef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#18181b" flood-opacity="0.10"/>
    </filter>
    <style>
      text { font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      @keyframes qin  { 0%,4% {opacity:0} 11%,90% {opacity:1} 100% {opacity:0} }
      @keyframes pop  { 0%,14% {opacity:0; transform:translateY(10px)} 22%,88% {opacity:1; transform:translateY(0)} 100% {opacity:0; transform:translateY(10px)} }
      @keyframes blink{ 0%,49% {opacity:1} 50%,100% {opacity:0} }
      #query  { animation: qin 7s ease-in-out infinite; }
      #c1     { animation: pop 7s ease-in-out infinite; }
      #c2     { animation: pop 7s ease-in-out infinite; animation-delay: .3s; }
      #c3     { animation: pop 7s ease-in-out infinite; animation-delay: .6s; }
      #cursor { animation: blink 1s step-end infinite; }
    </style>
  </defs>

  <rect x="0" y="0" width="840" height="520" rx="0" fill="#f4f4f5"/>
  <g filter="url(#shadow)">
    <rect x="20" y="20" width="800" height="480" rx="22" fill="#ffffff" stroke="#e4e4e7"/>
  </g>

  <!-- window dots -->
  <circle cx="48" cy="48" r="5" fill="#f87171"/>
  <circle cx="66" cy="48" r="5" fill="#fbbf24"/>
  <circle cx="84" cy="48" r="5" fill="#34d399"/>

  <!-- header -->
  <rect x="56" y="66" width="40" height="40" rx="12" fill="url(#brand)"/>
  <text x="76" y="93" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">?</text>
  <text x="108" y="97" fill="url(#brand)" font-size="30" font-weight="800">Lumify</text>
  <text x="58" y="128" fill="#71717a" font-size="13">The search engine that asks <tspan font-style="italic">why</tspan> you asked.</text>

  <!-- search pill -->
  <rect x="56" y="150" width="688" height="56" rx="28" fill="#fafafa" stroke="#e4e4e7"/>
  <circle cx="92" cy="178" r="7" fill="none" stroke="#a1a1aa" stroke-width="2"/>
  <line x1="97" y1="183" x2="103" y2="189" stroke="#a1a1aa" stroke-width="2" stroke-linecap="round"/>
  <g id="query">
    <text x="118" y="184" fill="#18181b" font-size="18">should I text him back</text>
    <rect id="cursor" x="306" y="167" width="2" height="22" fill="#4f46e5"/>
  </g>

  <text x="56" y="238" fill="#71717a" font-size="13">You might be asking because…</text>

  <!-- reason card 1 -->
  <g id="c1">
    <rect x="56" y="252" width="688" height="64" rx="14" fill="#ffffff" stroke="#e4e4e7"/>
    <text x="84" y="293" font-size="22">🧭</text>
    <text x="120" y="282" fill="#18181b" font-size="16" font-weight="700">Making a decision</text>
    <text x="120" y="303" fill="#71717a" font-size="13">whether to text him back</text>
    <rect x="630" y="270" width="98" height="24" rx="12" fill="#eef2ff"/>
    <text x="679" y="286" fill="#4f46e5" font-size="11" font-weight="600" text-anchor="middle">strong hunch</text>
  </g>

  <!-- reason card 2 -->
  <g id="c2">
    <rect x="56" y="326" width="688" height="64" rx="14" fill="#ffffff" stroke="#e4e4e7"/>
    <text x="84" y="367" font-size="22">💔</text>
    <text x="120" y="356" fill="#18181b" font-size="16" font-weight="700">Processing a feeling</text>
    <text x="120" y="377" fill="#71717a" font-size="13">working through how you feel about it</text>
  </g>

  <!-- reason card 3 -->
  <g id="c3">
    <rect x="56" y="400" width="688" height="64" rx="14" fill="#ffffff" stroke="#e4e4e7"/>
    <text x="84" y="441" font-size="22">😌</text>
    <text x="120" y="430" fill="#18181b" font-size="16" font-weight="700">Looking for reassurance</text>
    <text x="120" y="451" fill="#71717a" font-size="13">wanting to hear that you're okay</text>
  </g>
</svg>
